
<!DOCTYPE html>
<html>
<head>
<title>NEON SCAVENGER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Orbitron;
  color:#00ffe1;
  overflow:hidden;
  background:black;
}

/* 🎥 VIDEO */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  opacity:0;
  transition:opacity 1s ease;
}

#bgVideo.show{
  opacity:1;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* BOX */
.box{
  text-align:center;
  padding:40px;
  border:1px solid #00ffe1;
  background:rgba(0,0,0,0.5);
  box-shadow:0 0 25px #00ffe1;
}

/* INPUT */
input{
  padding:12px;
  width:240px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
  outline:none;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 25px;
  background:#00ccff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="box">
  <h1>⚡ E SCAVENGER</h1>

  <!-- 🔥 FORM FIX -->
  <form onsubmit="start(); return false;" autocomplete="off">
    <input id="team"
      type="text"
      placeholder="Enter Team Name"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      name="new-team-name"
      readonly
      onfocus="this.removeAttribute('readonly');">
  </form>

  <br>

  <button onclick="start()">ENTER</button>
</div>

<script>

/* VIDEO FIX */
let vid=document.getElementById("bgVideo");

vid.addEventListener("canplay",()=>{
  vid.classList.add("show");
});

vid.play().catch(()=>{});

/* CLEAR INPUT */
window.onload = () => {
  document.getElementById("team").value = "";
};

/* START FUNCTION */
function start(){
  let t=document.getElementById("team").value.trim();

  if(t){
    sessionStorage.clear();
    

    sessionStorage.setItem("team",t);
    sessionStorage.setItem("level",0);
    sessionStorage.setItem("startTime",Date.now());

    window.location.href="levels.html";
  }
}

</script>

</body>
</html>
