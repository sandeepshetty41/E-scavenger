<!DOCTYPE html>
<html>
<head>
<title>NEON SCAVENGER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Orbitron;
  color:#00ffe1;
  overflow:hidden;
}

/* 🎥 VIDEO BACKGROUND */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.5) contrast(1.2);
  animation:zoomMove 20s infinite alternate ease-in-out;
}

/* 🎬 ZOOM ANIMATION */
@keyframes zoomMove{
  from{ transform:scale(1); }
  to{ transform:scale(1.1); }
}

/* 🌑 DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* BOX */
.box{
  text-align:center;
  padding:40px;
  border:1px solid #00ffe1;
  box-shadow:0 0 25px #00ffe1;
  background:rgba(0,0,0,0.6);
  z-index:1;
}

/* INPUT */
input{
  padding:12px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
  outline:none;
  width:220px;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 25px;
  background:#00ffe1;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00ffe1;
}
</style>
</head>

<body>p

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="box">
  <h1> E SCAVENGER</h1>

  <input id="team"
         type="text"
         placeholder="Enter Team Name"
         autocomplete="off"
         autocorrect="off"
         autocapitalize="off"
         spellcheck="false"
         readonly
         onfocus="this.removeAttribute('readonly');">

  <br>

  <button onclick="start()">ENTER</button>
</div>

<script>

function start(){

  let t = document.getElementById("team").value.trim();

  if(t){

    /* CLEAR EVERYTHING */
    sessionStorage.clear();
    localStorage.removeItem("leaderboard");

    sessionStorage.setItem("team", t);
    sessionStorage.setItem("currentLevel", 1);
    sessionStorage.setItem("completed", 0);
    sessionStorage.setItem("startTime", Date.now());

    window.location.href = "levels.html";
  }
}

/* ENTER KEY SUPPORT */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") start();
});

</script>

</body>
</html>
