<!DOCTYPE html>
<html>
<head>
<title>LEADERBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  background:black;
  color:#00ffe1;
  text-align:center;
}

table{
  margin:auto;
  margin-top:40px;
  width:85%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #00ffe1;
  padding:15px;
}
</style>
</head>

<body>

<h1>🏆 LEADERBOARD</h1>

<table>
<tr>
<th>RANK</th>
<th>TEAM</th>
<th>LEVEL COMPLETED</th>
<th>TIME (s)</th>
<th>STATUS</th>
</tr>

<tbody id="board"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function load(){

  let snap = await get(ref(db,"leaderboard"));

  let data = snap.exists() ? Object.values(snap.val()) : [];

  /* SORT BY LEVEL THEN TIME */
  data.sort((a,b)=>{
    if(b.levelCompleted===a.levelCompleted)
      return a.time-b.time;
    return b.levelCompleted-a.levelCompleted;
  });

  let board=document.getElementById("board");
  board.innerHTML="";

  data.forEach((p,i)=>{

    board.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.levelCompleted}/5</td>
      <td>${p.time}</td>
      <td>${p.status}</td>
    </tr>`;
  });

}

load();

</script>

</body>
</html>
