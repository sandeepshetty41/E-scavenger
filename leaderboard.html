<!DOCTYPE html>
<html>
<head>
<title>LEADERBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  background:#05070f;
  color:#00ffe1;
  font-family:Orbitron;
  text-align:center;
}
table{
  margin:auto;
  margin-top:40px;
  width:85%;
  border-collapse:collapse;
}
th,td{
  border:1px solid #00ffe1;
  padding:15px;
}
.top{color:#00ff88;}
</style>
</head>

<body>

<h1>🏆 FINAL LEADERBOARD</h1>

<table>
<tr>
<th>RANK</th>
<th>TEAM</th>
<th>TIME</th>
<th>LEVEL</th>
<th>STATUS</th>
</tr>
<tbody id="board"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LIVE DATA */
onValue(ref(db,"leaderboard"),(snap)=>{

  let data = snap.exists() ? Object.values(snap.val()) : [];

  data.sort((a,b)=>a.time-b.time);

  let board=document.getElementById("board");
  board.innerHTML="";

  data.forEach((p,i)=>{
    board.innerHTML+=`
    <tr class="${i===0?'top':''}">
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.time}</td>
      <td>${p.level}</td>
      <td>${p.status}</td>
    </tr>`;
  });

});
</script>

</body>
</html>
