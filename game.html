<!DOCTYPE html>
<html>
<head>

<title>GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  color:#00ffe1;
  text-align:center;
  overflow:hidden;
  background:black;
}

/* INTRO */
#levelIntro{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:20;
  animation:fadeOut 3s forwards;
}

@keyframes fadeOut{
  0%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

/* VIDEO */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
  opacity:0;
  transition:0.8s;
}
#bgVideo.show{opacity:1;}

/* COMPLETE VIDEO */
#completeVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:10;
  display:none;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:-2;
}

/* BOX */
.box{
  margin-top:8%;
  padding:30px;
  border:2px solid #00ffe1;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 25px #00ffe1;
}

/* INPUT */
input{
  padding:12px;
  width:260px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
}

/* BUTTON */
button{
  margin:10px;
  padding:12px 25px;
  background:transparent;
  color:#00ccff;
  border:2px solid #00ccff;
  cursor:pointer;
}

/* FEEDBACK */
#feedback{height:25px;margin-top:10px;}
.correctText{color:#00ff88;}
.wrongText{color:red;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="levelIntro">
  <h1 id="levelText"></h1>
  <p>MISSION START</p>
</div>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline></video>

<!-- COMPLETE -->
<video id="completeVideo" playsinline>
  <source src="complete.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h2 id="timer"></h2>

<div class="box" id="gameBox">
  <h2 id="q"></h2>

  <input id="ans" autocomplete="off">
  <br>

  <button onclick="check()">SUBMIT</button>
  <button onclick="showHint()">HINT</button>

  <div id="feedback"></div>
  <p id="hintBox"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  authDomain: "e-scavenger.firebaseapp.com",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveScore = async function(status, timeTaken, level){
  let team = sessionStorage.getItem("team") || "Anonymous";

  await push(ref(db,"leaderboard"),{
    name:team,
    time:timeTaken,
    level:level,
    status:status
  });
};
</script>

<script>

let level = parseInt(sessionStorage.getItem("level")) || 0;
let startTime = Number(sessionStorage.getItem("startTime")) || Date.now();

const levelNames=["RIDDLES","PUZZLES","ENCRYPTION","LOGIC","BOSS"];

document.getElementById("levelText").innerText=
"LEVEL "+(level+1)+" - "+levelNames[level];

setTimeout(()=>{
  document.getElementById("levelIntro").remove();
},3000);

/* VIDEO */
let vid=document.getElementById("bgVideo");
vid.innerHTML=`<source src="level${level+1}.mp4" type="video/mp4">`;
vid.load();
vid.play().catch(()=>{});

/* TIMER */
const TOTAL=2*60*60*1000;

setInterval(()=>{
  let t=TOTAL-(Date.now()-startTime);
  if(t<=0) window.location.href="leaderboard.html";

  let h=Math.floor(t/3600000);
  let m=Math.floor((t%3600000)/60000);
  let s=Math.floor((t%60000)/1000);

  document.getElementById("timer").innerText=
  `${h}:${m}:${s}`;
},1000);

/* FULL FIXED Q&A (YOUR DATA CLEANED) */
const gameData = [

/* LEVEL 1 */
[
{q:"I am the brain of the computer. What am I?", a:"cpu", hint:"Main processor"},
{q:"I store temporary memory. What am I?", a:"ram", hint:"Volatile memory"}
],

/* LEVEL 2 */
[
{q:"8 bits equals what?", a:"byte", hint:"Storage unit"},
{q:"0 and 1 system is called?", a:"binary", hint:"Base 2 system"}
],

/* LEVEL 3 */
[
{q:"XFMDPNF decrypted word?", a:"welcome", hint:"Shift back letters"},
{q:"DPNQVUFS decrypted word?", a:"computer", hint:"Common device"}
],

/* LEVEL 4 */
[
{q:"Decision keyword in programming?", a:"if", hint:"Condition check"},
{q:"Repeating code is called?", a:"loop", hint:"Iteration"}
],

/* LEVEL 5 */
[
{q:"Indexed storage structure?", a:"array", hint:"List of items"},
{q:"OOP concept hiding data?", a:"encapsulation", hint:"Security in classes"}
]

];

let qIndex=0;

function load(){
  if(!gameData[level] || !gameData[level][qIndex]) return;

  document.getElementById("q").innerText=
  gameData[level][qIndex].q;

  document.getElementById("ans").value="";
  document.getElementById("hintBox").innerText="";
  document.getElementById("feedback").innerText="";
}
load();

function showHint(){
  document.getElementById("hintBox").innerText=
  "💡 "+gameData[level][qIndex].hint;
}

function check(){

  if(!gameData[level][qIndex]) return;

  let box=document.getElementById("gameBox");
  let f=document.getElementById("feedback");

  let a=document.getElementById("ans").value.toLowerCase().trim();

  if(a===gameData[level][qIndex].a){

    box.classList.add("correct");
    f.innerText="✔ CORRECT";
    f.className="correctText";

    setTimeout(()=>{

      box.classList.remove("correct");
      qIndex++;

      if(qIndex>=gameData[level].length){

        level++;
        sessionStorage.setItem("level",level);

        if(level>=gameData.length){

          let timeTaken=Math.floor((Date.now()-startTime)/1000);
          if(window.saveScore)
            window.saveScore("COMPLETED",timeTaken,level+1);

          window.location.href="leaderboard.html";
        }else{
          qIndex=0;
          load();
        }

      }else load();

    },800);

  }else{

    box.classList.add("wrong");
    f.innerText="✖ WRONG";
    f.className="wrongText";

    setTimeout(()=>{
      box.classList.remove("wrong");
      f.innerText="";
    },800);

    document.getElementById("ans").value="";
  }
}

document.getElementById("ans").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") check();
});

</script>

</body>
</html>
