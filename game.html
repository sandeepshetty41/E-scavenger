<!DOCTYPE html>
<html>
<head>
<title>GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  background:black;
  color:#00ffe1;
  text-align:center;
}

.box{
  margin-top:8%;
  padding:30px;
  border:2px solid #00ffe1;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 25px #00ffe1;
}

input{
  padding:12px;
  width:260px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
}

button{
  margin:10px;
  padding:12px 25px;
  background:transparent;
  color:#00ccff;
  border:2px solid #00ccff;
  cursor:pointer;
}

#hintBox{color:#00ccff;margin-top:10px;}
#feedback{height:25px;margin-top:10px;}
.correct{color:#00ff88;}
.wrong{color:red;}
</style>
</head>

<body>

<h2 id="q">Loading...</h2>

<div class="box">

  <input id="ans" autocomplete="off">
  <br>

  <button onclick="check()">SUBMIT</button>
  <button onclick="showHint()">HINT</button>

  <p id="hintBox"></p>
  <p id="feedback"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  authDomain: "e-scavenger.firebaseapp.com",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = async function(status, level){

  let name = sessionStorage.getItem("team") || "Anonymous";
  let start = Number(sessionStorage.getItem("startTime")) || Date.now();
  let time = Math.floor((Date.now() - start)/1000);

  await set(ref(db,"leaderboard/"+name.replace(/\s/g,"_")),{
    name,
    levelCompleted:level,
    time,
    status
  });
};

</script>

<script>

/* SAFE INIT */
let level = Number(sessionStorage.getItem("level") || 0);
let qIndex = 0;

if(!sessionStorage.getItem("startTime")){
  sessionStorage.setItem("startTime",Date.now());
}

/* QUESTIONS */
const gameData = [
[
{q:"CPU stands for?", a:"cpu", hint:"Brain of computer"},
{q:"Temporary memory?", a:"ram", hint:"Volatile memory"}
],
[
{q:"8 bits = ?", a:"byte", hint:"Storage unit"},
{q:"Binary system uses?", a:"binary", hint:"0 and 1"}
],
[
{q:"XFMDPNF?", a:"welcome", hint:"Decode"},
{q:"DPNQVUFS?", a:"computer", hint:"Device"}
],
[
{q:"Decision keyword?", a:"if", hint:"Condition"},
{q:"Loop means?", a:"loop", hint:"Repeat"}
],
[
{q:"Indexed structure?", a:"array", hint:"List"},
{q:"Hide data concept?", a:"encapsulation", hint:"OOP"}
]
];

/* GUARANTEE LOAD ONLY WHEN READY */
window.onload = function(){
  load();
};

function load(){

  if(!gameData[level] || !gameData[level][qIndex]){
    document.getElementById("q").innerText="ERROR LOADING QUESTION";
    return;
  }

  document.getElementById("q").innerText =
  gameData[level][qIndex].q;

  document.getElementById("ans").value="";
  document.getElementById("hintBox").innerText="";
  document.getElementById("feedback").innerText="";
}

window.showHint = function(){
  document.getElementById("hintBox").innerText =
  "💡 "+gameData[level][qIndex].hint;
}

window.check = async function(){

  let input = document.getElementById("ans").value.toLowerCase().trim();
  let correct = gameData[level][qIndex].a;

  let fb = document.getElementById("feedback");

  if(input === correct){

    qIndex++;

    if(qIndex >= gameData[level].length){

      level++;
      sessionStorage.setItem("level",level);

      await window.saveData("LEVEL COMPLETED", level);

      if(level >= gameData.length){

        await window.saveData("COMPLETED", level);
        window.location.href="leaderboard.html";

      } else {
        qIndex = 0;
        load();
      }

    } else {
      load();
    }

    fb.innerText="✔ CORRECT";
    fb.className="correct";

  } else {

    fb.innerText="✖ WRONG";
    fb.className="wrong";
    document.getElementById("ans").value="";
  }
}

/* ENTER KEY SUPPORT */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") check();
});

</script>

</body>
</html>
