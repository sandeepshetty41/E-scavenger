<!DOCTYPE html>
<html>
<head>

<title>GAME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  color:#00ffe1;
  text-align:center;
  overflow:hidden;
  background:black;
}

#gameBox{
  margin-top:8%;
  padding:30px;
  border:2px solid #00ffe1;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 25px #00ffe1;
}

input{
  padding:12px;
  width:260px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
}

button{
  margin:10px;
  padding:12px 25px;
  background:transparent;
  color:#00ccff;
  border:2px solid #00ccff;
  cursor:pointer;
}
</style>
</head>

<body>

<h2 id="q"></h2>

<div id="gameBox">
  <input id="ans" autocomplete="off">
  <br>
  <button onclick="check()">SUBMIT</button>
  <button onclick="showHint()">HINT</button>

  <p id="hintBox"></p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  authDomain: "e-scavenger.firebaseapp.com",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* SAFE KEY */
function getKey(name){
  return name.replace(/\s+/g,'_');
}

/* CREATE / UPDATE SINGLE USER RECORD */
window.saveProgress = async function(status, level){

  let name = sessionStorage.getItem("team") || "Anonymous";
  let key = getKey(name);

  let startTime = Number(sessionStorage.getItem("startTime"));
  let timeTaken = Math.floor((Date.now() - startTime)/1000);

  await set(ref(db,"leaderboard/"+key),{
    name:name,
    levelCompleted:level,
    time:timeTaken,
    status:status,
    timestamp:Date.now()
  });
};

</script>

<script>

let level = parseInt(sessionStorage.getItem("level")) || 0;
let startTime = Number(sessionStorage.getItem("startTime")) || Date.now();

const gameData = [
[
{q:"CPU stands for?", a:"cpu", hint:"Brain of computer"},
{q:"Temporary memory?", a:"ram", hint:"Volatile memory"}
],
[
{q:"8 bits = ?", a:"byte", hint:"Storage unit"},
{q:"0 and 1 system?", a:"binary", hint:"Base 2"}
],
[
{q:"XFMDPNF?", a:"welcome", hint:"Decode"},
{q:"DPNQVUFS?", a:"computer", hint:"Device"}
],
[
{q:"Decision keyword?", a:"if", hint:"Condition"},
{q:"Loop is?", a:"loop", hint:"Repeat"}
],
[
{q:"Indexed structure?", a:"array", hint:"List"},
{q:"Hide data concept?", a:"encapsulation", hint:"OOP"}
]
];

let qIndex=0;

function load(){
  document.getElementById("q").innerText =
  gameData[level][qIndex].q;

  document.getElementById("ans").value="";
  document.getElementById("hintBox").innerText="";
}
load();

function showHint(){
  document.getElementById("hintBox").innerText =
  "💡 "+gameData[level][qIndex].hint;
}

async function check(){

  let a=document.getElementById("ans").value.toLowerCase().trim();

  if(a===gameData[level][qIndex].a){

    qIndex++;

    if(qIndex>=gameData[level].length){

      level++;
      sessionStorage.setItem("level",level);

      /* UPDATE PROGRESS (ONLY ONE RECORD) */
      if(level>=gameData.length){

        await window.saveProgress("COMPLETED",level);

        window.location.href="leaderboard.html";

      }else{

        await window.saveProgress("LEVEL COMPLETED",level);
        qIndex=0;
        load();
      }

    }else{
      load();
    }

  }else{
    document.getElementById("ans").value="";
  }
}

/* TIME OUT */
setTimeout(async ()=>{
  await window.saveProgress("GAME OVER",level);
  window.location.href="leaderboard.html";
},2*60*60*1000);

</script>

</body>
</html>
