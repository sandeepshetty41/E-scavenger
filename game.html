<!DOCTYPE html>
<html>
<head>
<title>GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  color:#00ffe1;
  text-align:center;
  background:black;
}
.box{
  margin-top:8%;
  padding:30px;
  border:2px solid #00ffe1;
  background:rgba(0,0,0,0.6);
}
input{
  padding:12px;
  width:260px;
  background:black;
  border:1px solid #00ffe1;
  color:#00ffe1;
  text-align:center;
}
button{
  margin:10px;
  padding:12px 25px;
  background:transparent;
  color:#00ccff;
  border:2px solid #00ccff;
}
.correctText{color:#00ff88;}
.wrongText{color:red;}
</style>
</head>

<body>

<h2 id="timer"></h2>

<div class="box">
  <h2 id="q"></h2>
  <input id="ans">
  <br>
  <button onclick="check()">SUBMIT</button>
  <button onclick="showHint()">HINT</button>

  <div id="feedback"></div>
  <p id="hintBox"></p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔴 YOUR FIREBASE CONFIG (keep exactly same as your project) */
const firebaseConfig = {
  apiKey: "AIzaSyDZbLNAmcWBrNBNwR4c_sEtXXxYBPc63ts",
  databaseURL: "https://e-scavenger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-scavenger"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* SAVE FINAL SCORE */
window.saveScore = async function(timeTaken){
  let team = sessionStorage.getItem("team") || "Team_"+Math.floor(Math.random()*1000);

  await set(ref(db,"leaderboard/"+team),{
    name:team,
    time:timeTaken,
    level:5,
    status:"COMPLETED",
    timestamp:Date.now()
  });

  console.log("✅ Score Saved");
};
</script>

<script>
let level = parseInt(sessionStorage.getItem("level")) || 0;
let startTime = Number(sessionStorage.getItem("startTime")) || Date.now();

/* STORE START TIME */
sessionStorage.setItem("startTime", startTime);

/* TIMER */
setInterval(()=>{
  let t=(Date.now()-startTime)/1000;
  document.getElementById("timer").innerText="Time: "+Math.floor(t)+"s";
},1000);

/* QUESTIONS */
const gameData=[
[
{q:"I am the brain of the computer. What am I?",a:"cpu",hint:"Main processor"},
{q:"I store temporary memory. What am I?",a:"ram",hint:"Volatile"}
],
[
{q:"8 bits equals what?",a:"byte",hint:"Unit"},
{q:"0 and 1 system?",a:"binary",hint:"Base 2"}
],
[
{q:"XFMDPNF?",a:"welcome",hint:"Decode"},
{q:"DPNQVUFS?",a:"computer",hint:"Device"}
],
[
{q:"Decision keyword?",a:"if",hint:"Condition"},
{q:"Loop is?",a:"loop",hint:"Repeat"}
],
[
{q:"Indexed storage?",a:"array",hint:"List"},
{q:"Hiding data?",a:"encapsulation",hint:"OOP"}
]
];

let qIndex=0;

function load(){
  document.getElementById("q").innerText=
  gameData[level][qIndex].q;

  document.getElementById("ans").value="";
  document.getElementById("feedback").innerText="";
  document.getElementById("hintBox").innerText="";
}
load();

function showHint(){
  document.getElementById("hintBox").innerText=
  gameData[level][qIndex].hint;
}

function check(){

  let ans=document.getElementById("ans").value.toLowerCase().trim();

  if(ans===gameData[level][qIndex].a){

    qIndex++;

    if(qIndex>=gameData[level].length){

      level++;
      sessionStorage.setItem("level",level);

      if(level>=gameData.length){

        let timeTaken=Math.floor((Date.now()-startTime)/1000);

        window.saveScore(timeTaken);

        alert("🎉 GAME COMPLETED!");
        window.location.href="leaderboard.html";

      }else{
        qIndex=0;
        load();
      }

    }else load();

  }else{
    document.getElementById("feedback").innerText="Wrong!";
    document.getElementById("feedback").className="wrongText";
  }
}

document.getElementById("ans").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") check();
});
</script>

</body>
</html>
