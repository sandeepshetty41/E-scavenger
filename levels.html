<!DOCTYPE html>
<html>
<head>
<title>LEVEL MAP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  color:#00ffe1;
  text-align:center;
  overflow:hidden;
  background:black;
}

/* 🎥 VIDEO */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  opacity:0;
  transition:opacity 1s ease;
}

/* SHOW VIDEO */
#bgVideo.show{
  opacity:1;
}

/* LIGHT OVERLAY (NOT DARK) */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}

/* TITLE */
h1{
  margin-top:30px;
  text-shadow:0 0 20px #00ffe1;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,120px);
  gap:25px;
  justify-content:center;
  margin-top:60px;
}

/* BOX */
.box{
  height:110px;
  width:110px;
  border:2px solid #00ffe1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:rgba(0,0,0,0.4);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #00ffe1;
}

/* STATES */
.locked{
  opacity:0.3;
  pointer-events:none;
}

.current{
  border:2px solid #00ccff;
}

.done{
  color:#00ff88;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="bg1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>⚡ LEVEL MAP</h1>
<div class="grid" id="grid"></div>

<script>

/* VIDEO FIX */
let vid=document.getElementById("bgVideo");

vid.addEventListener("canplay",()=>{
  vid.classList.add("show");
});

vid.play().catch(()=>{});

/* LEVEL SYSTEM */
let level=parseInt(sessionStorage.getItem("level"))||0;
let grid=document.getElementById("grid");

for(let i=1;i<=5;i++){

let d=document.createElement("div");
d.className="box";

if(i>level+1){
  d.classList.add("locked");
  d.innerHTML="🔒";
}
else if(i===level+1){
  d.classList.add("current");
  d.innerHTML="▶ LEVEL "+i;

  d.onclick=()=>{
    sessionStorage.setItem("level",i-1);
    window.location.href="game.html";
  };
}
else{
  d.classList.add("done");
  d.innerHTML="✔ LEVEL "+i;
}

grid.appendChild(d);
}

</script>

</body>
</html>
